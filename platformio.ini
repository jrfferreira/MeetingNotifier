; MeetingNotifier — ESP32-C3 + TFT
;
; Build environments:
;
;   esp32-c3-devkitm-1     default — standalone ST7789 240×240 module +
;                          JSON endpoint (Apps Script / local helper)
;   esp32-c3-ical          standalone ST7789 240×240 module + iCal source
;   esp32-c3-spotpear-144  Spotpear / Fikra "ESP32-C3 com Display Integrado
;                          1.44 Polegadas" — ST7735 128×128 + JSON source
;   esp32-c3-spotpear-144-ical  same board with iCal source
;   esp32-c3-probe         display pin-map probe — cycles through candidate
;                          configurations on undocumented integrated boards

[env]
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

board_build.partitions = default.csv

lib_deps =
  adafruit/Adafruit ST7735 and ST7789 Library@^1.10.0
  adafruit/Adafruit GFX Library@^1.11.5
  bblanchon/ArduinoJson@^6.21.3

build_flags =
  -DCORE_DEBUG_LEVEL=2
  -DBOARD_HAS_PSRAM=0
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  -DCONFIG_ARDUINO_LOOP_STACK_SIZE=16384

; Default: include everything *except* probe.cpp (it has its own setup/loop).
build_src_filter = +<*> -<probe.cpp>

[env:esp32-c3-devkitm-1]
; JSON endpoint (default).

[env:esp32-c3-ical]
build_flags =
  ${env.build_flags}
  -DUSE_ICAL_SOURCE

[env:esp32-c3-spotpear-144]
build_flags =
  ${env.build_flags}
  -DBOARD_SPOTPEAR_C3_144

[env:esp32-c3-spotpear-144-ical]
build_flags =
  ${env.build_flags}
  -DBOARD_SPOTPEAR_C3_144
  -DUSE_ICAL_SOURCE

[env:esp32-c3-probe]
; Compile only the probe sketch.
build_src_filter = +<probe.cpp>
