; MeetingNotifier — ESP32-C3 + ST7789 1.4" TFT
;
; Three build environments:
;
;   esp32-c3-devkitm-1   default — JSON endpoint (Apps Script or the
;                        local Python helper in tools/calendar_helper.py)
;   esp32-c3-ical        iCal — fetches .ics directly (Google Calendar
;                        "Secret address in iCal format")
;   esp32-c3-probe       display pin-map probe — cycles through candidate
;                        configurations on small integrated C3+TFT boards
;                        whose internal wiring isn't documented

[env]
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

board_build.partitions = default.csv

lib_deps =
  adafruit/Adafruit ST7735 and ST7789 Library@^1.10.0
  adafruit/Adafruit GFX Library@^1.11.5
  bblanchon/ArduinoJson@^6.21.3

build_flags =
  -DCORE_DEBUG_LEVEL=2
  -DBOARD_HAS_PSRAM=0
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1

; Default: include everything *except* probe.cpp (it has its own setup/loop).
build_src_filter = +<*> -<probe.cpp>

[env:esp32-c3-devkitm-1]
; JSON endpoint (default).

[env:esp32-c3-ical]
build_flags =
  ${env.build_flags}
  -DUSE_ICAL_SOURCE

[env:esp32-c3-probe]
; Compile only the probe sketch.
build_src_filter = +<probe.cpp>
