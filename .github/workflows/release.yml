name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware (both envs)
        run: pio run

      - name: Compute tag
        id: ver
        run: |
          TAG="v$(date -u +'%Y.%m.%d')-${{ github.run_number }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Stage artifacts
        run: |
          mkdir release
          TAG="${{ steps.ver.outputs.tag }}"
          for ENV in esp32-c3-devkitm-1 esp32-c3-ical; do
            BUILD=".pio/build/$ENV"
            cp "$BUILD/firmware.bin" "release/MeetingNotifier-$ENV-$TAG.bin"
            cp "$BUILD/firmware.elf" "release/MeetingNotifier-$ENV-$TAG.elf"
            if [ -f "$BUILD/firmware.factory.bin" ]; then
              cp "$BUILD/firmware.factory.bin" "release/MeetingNotifier-$ENV-$TAG-factory.bin"
            fi
          done

      - uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.ver.outputs.tag }}
          name:       ${{ steps.ver.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: release/*
          fail_on_unmatched_files: true
          body: |
            Built from `${{ github.sha }}`.

            Two firmware variants attached, both built with the placeholder
            `CALENDAR_URL` — rebuild locally with your own URL for a working
            device.

            | Variant | Calendar source |
            | --- | --- |
            | `esp32-c3-devkitm-1` | JSON endpoint (Apps Script or `tools/calendar_helper.py`) |
            | `esp32-c3-ical`      | iCal (.ics) — Google's "Secret address in iCal format" |

            Flash:
            ```
            esptool.py --chip esp32c3 --port /dev/ttyACM0 \
                       write_flash 0x10000 firmware.bin
            ```
