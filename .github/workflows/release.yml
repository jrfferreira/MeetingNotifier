name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware (both envs)
        run: pio run

      - name: Compute tag
        id: ver
        run: |
          TAG="v$(date -u +'%Y.%m.%d')-${{ github.run_number }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Stage release artifacts (versioned)
        run: |
          mkdir release
          TAG="${{ steps.ver.outputs.tag }}"
          for ENV in esp32-c3-devkitm-1 esp32-c3-ical; do
            BUILD=".pio/build/$ENV"
            cp "$BUILD/firmware.bin"   "release/MeetingNotifier-$ENV-$TAG.bin"
            cp "$BUILD/firmware.elf"   "release/MeetingNotifier-$ENV-$TAG.elf"
            cp "$BUILD/bootloader.bin" "release/bootloader-$ENV-$TAG.bin"
            cp "$BUILD/partitions.bin" "release/partitions-$ENV-$TAG.bin"
          done

      - uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.ver.outputs.tag }}
          name:       ${{ steps.ver.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: release/*
          fail_on_unmatched_files: true
          body: |
            Built from `${{ github.sha }}`.

            ### Easiest install — web flasher
            Plug in your ESP32-C3 and visit
            **<https://jrfferreira.github.io/MeetingNotifier/install/>** in
            Chrome / Edge / Opera. No PlatformIO needed.

            ### Manual flash
            ```
            esptool.py --chip esp32c3 --port /dev/ttyACM0 write_flash \
              0x0     bootloader-<env>-${{ steps.ver.outputs.tag }}.bin \
              0x8000  partitions-<env>-${{ steps.ver.outputs.tag }}.bin \
              0x10000 MeetingNotifier-<env>-${{ steps.ver.outputs.tag }}.bin
            ```
            where `<env>` is `esp32-c3-devkitm-1` (JSON source) or
            `esp32-c3-ical` (iCal source). The captive portal prompts for
            the calendar URL on first boot — no rebuild required.

      - name: Stage GitHub Pages artifact
        run: |
          set -euo pipefail
          mkdir -p pages
          cp -r docs/install pages/install

          # Per-source firmware + bootloader + partition table.
          for SRC in json ical; do
            case "$SRC" in
              json) ENV=esp32-c3-devkitm-1 ;;
              ical) ENV=esp32-c3-ical ;;
            esac
            BUILD=".pio/build/$ENV"
            cp "$BUILD/firmware.bin"   "pages/install/firmware-$SRC.bin"
            cp "$BUILD/bootloader.bin" "pages/install/bootloader-$SRC.bin"
            cp "$BUILD/partitions.bin" "pages/install/partitions-$SRC.bin"
          done

          # boot_app0.bin is shared; locate it in the framework package.
          BOOT_APP0=$(find ~/.platformio/packages -name boot_app0.bin | head -n1)
          cp "$BOOT_APP0" pages/install/boot_app0.bin

          # Fill the version placeholder in the manifests.
          sed -i "s/__VERSION__/${{ steps.ver.outputs.tag }}/g" pages/install/manifest-*.json

          # A tiny landing page so the repo root on GitHub Pages isn't 404.
          cat > pages/index.html <<EOF
          <!doctype html><meta charset="utf-8"><title>MeetingNotifier</title>
          <meta http-equiv=refresh content="0; url=install/">
          <p>Redirecting to <a href="install/">install/</a>…</p>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - id: deploy-pages
        uses: actions/deploy-pages@v4
