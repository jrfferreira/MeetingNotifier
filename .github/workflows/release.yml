name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware
        run: pio run -e esp32-c3-devkitm-1

      - name: Compute tag
        id: ver
        run: |
          TAG="v$(date -u +'%Y.%m.%d')-${{ github.run_number }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Stage artifacts
        run: |
          mkdir release
          BUILD=.pio/build/esp32-c3-devkitm-1
          cp "$BUILD/firmware.bin"          "release/MeetingNotifier-${{ steps.ver.outputs.tag }}.bin"
          cp "$BUILD/firmware.elf"          "release/MeetingNotifier-${{ steps.ver.outputs.tag }}.elf"
          if [ -f "$BUILD/firmware.factory.bin" ]; then
            cp "$BUILD/firmware.factory.bin" "release/MeetingNotifier-${{ steps.ver.outputs.tag }}-factory.bin"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.ver.outputs.tag }}
          name:       ${{ steps.ver.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: release/*
          fail_on_unmatched_files: true
          body: |
            Built from `${{ github.sha }}`.

            > **Configure before flashing.** `firmware.bin` is built with the
            > placeholder `CALENDAR_URL`. Edit `src/calendar.h` (or override
            > with `-DCALENDAR_URL=…` in `platformio.ini` build flags) and
            > rebuild locally for a working device.

            Flash:
            ```
            esptool.py --chip esp32c3 --port /dev/ttyACM0 \
                       write_flash 0x10000 firmware.bin
            ```
